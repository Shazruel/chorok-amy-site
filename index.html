<!DOCTYPE html>
<html>
<head>
    <title>CloudMoon Mirror</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<iframe id="gameFrame" src="https://web.cloudmoonapp.com/apps/roblox"></iframe>

<script>
    // This script tries to intercept "window.open" calls 
    // and forces them to load inside the SAME iframe instead of a popup.
    const frame = document.getElementById('gameFrame');
    
    window.open = function(url) {
        frame.src = url; // Redirect the iframe instead of opening a new tab
        return null; 
    };
</script>

</body>
</html>
